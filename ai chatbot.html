<!DOCTYPE html>
<html lang="en" class="h-full dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Shopping Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @keyframes subtleGlow {
            0% { box-shadow: 0 0 5px rgba(74, 222, 128, 0.3); }
            100% { box-shadow: 0 0 15px rgba(74, 222, 128, 0.1); }
        }
        .action-button {
            animation: subtleGlow 2s infinite alternate;
        }
        .chat-container {
            height: 500px;
        }
        .message {
            max-width: 80%;
        }
        .bg-dark-panel {
            background: rgba(15, 23, 42, 0.8);
        }
        #threejs-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.15;
        }
        .assistant-message {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.5;
            /* padding-top:-10; */
        }

        .assistant-message-First {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 0.5;
        }
        .square-chip {
            border-radius: 4px;
        }
    </style>
</head>
<body class="h-full bg-slate-900">
    <div id="threejs-bg"></div>
    
    <div class="container mx-auto px-4 py-8 h-full flex flex-col max-w-4xl">
        <!-- Minimal Header -->
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-white">
                <span class="text-emerald-400">Eco</span> Shopping Assistant
            </h1>
            <p class="text-slate-400 mt-1">Make sustainable choices effortlessly</p>
        </header>

        <!-- Quick Action Squares -->
        <div class="mb-8 grid grid-cols-2 md:grid-cols-4 gap-3">
            <button class="quick-action bg-slate-800 hover:bg-slate-700 text-emerald-400 py-3 px-4 square-chip transition-all border border-slate-700 action-button">
                ♻️ Find Alternatives
            </button>
            <button class="quick-action bg-slate-800 hover:bg-slate-700 text-emerald-400 py-3 px-4 square-chip transition-all border border-slate-700 action-button">
                📊 Carbon Impact
            </button>
            <button class="quick-action bg-slate-800 hover:bg-slate-700 text-emerald-400 py-3 px-4 square-chip transition-all border border-slate-700 action-button">
                💡 Eco Tips
            </button>
            <button class="quick-action bg-slate-800 hover:bg-slate-700 text-emerald-400 py-3 px-4 square-chip transition-all border border-slate-700 action-button">
                🏪 Local Stores
            </button>
        </div>

        <!-- Chat Container -->
        <div class="flex-1 bg-slate-800 rounded-lg overflow-hidden flex flex-col max-h-[1000px] border border-slate-200">
            <!-- Chat Messages -->
            <div id="chat-messages" class="flex-1 pl-4 overflow-y-auto chat-container space-y-1">
                <div class="message bg-slate-700 pl-4 rounded square-chip">
                    <div class="assistant-message text-slate-200">
                        <div class="assistant-message-First text-slate-200">
                            <p>🛍️ <span class="text-emerald-400">Welcome to your eco shopping assistant!</span></p>
                        <p class="mt--1">I can help you:</p>
                        <ul class="list-disc pl-5 mt--1">
                        <li>Discover sustainable product alternatives</li>
                        <li>Calculate environmental impact</li>
                        <li>Find ethical brands</li>
                        <li>Reduce shopping waste</li>
                    </ul>
                    <p class="mt-0">What would you like help with today?</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chat Input -->
            <div class="border-t border-slate-700 p-4 bg-slate-900">
                <div class="flex space-x-2">
                    <input id="user-input" type="text" placeholder="Ask about sustainable shopping..." class="flex-1 px-4 py-2 rounded square-chip border border-slate-700 focus:outline-none focus:ring-1 focus:ring-emerald-500 bg-slate-800 text-white placeholder-slate-500">
                    <button id="send-btn" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2 rounded square-chip transition-all flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707l-3-3a1 1 0 00-1.414 1.414L10.586 9H7a1 1 0 100 2h3.586l-1.293 1.293a1 1 0 101.414 1.414l3-3a1 1 0 000-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
                <div class="mt-3 flex flex-wrap gap-2">
                    <button class="suggestion-btn text-sm bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 square-chip border border-slate-700">
                        Best reusable bottles
                    </button>
                    <button class="suggestion-btn text-sm bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 square-chip border border-slate-700">
                        Eco fashion brands
                    </button>
                    <button class="suggestion-btn text-sm bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 square-chip border border-slate-700">
                        Reduce packaging
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Chat Functionality
        const chatMessages = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', 'p-4', 'rounded', 'square-chip');
            
            if (role === 'user') {
                messageDiv.classList.add('ml-auto', 'bg-slate-700', 'text-slate-200');
                messageDiv.innerHTML = content;
            } else {
                messageDiv.classList.add('bg-slate-700', 'text-slate-200');
                messageDiv.innerHTML = `<div class="assistant-message">${content}</div>`;
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            addMessage('user', message);
            userInput.value = '';
            
            // Typing indicator
            const typingIndicator = document.createElement('div');
            typingIndicator.classList.add('message', 'bg-slate-700', 'p-4', 'rounded', 'square-chip');
            typingIndicator.innerHTML = `<div class="flex space-x-2">
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-bounce"></div>
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-bounce" style="animation-delay: 0.2s"></div>
                <div class="w-2 h-2 rounded-full bg-emerald-400 animate-bounce" style="animation-delay: 0.4s"></div>
            </div>`;
            chatMessages.appendChild(typingIndicator);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            try {
                // IMPORTANT: In production, move this to a backend service
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer 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`,
                        "HTTP-Referer": window.location.href,
                        "X-Title": "Eco Shopping Assistant",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        "model": "deepseek/deepseek-chat-v3-0324:free",
                        "messages": [
                            {
                                "role": "system",
                                "content": "You are an eco shopping assistant. Provide concise, practical advice about sustainable products, reducing waste, and ethical consumption. Use bullet points when helpful. Keep responses focused and professional with occasional emojis. Format responses for easy reading in a chat interface."
                            },
                            {
                                "role": "user",
                                "content": message
                            }
                        ],
                        "temperature": 0.7
                    })
                });
                
                const data = await response.json();
                chatMessages.removeChild(typingIndicator);
                
                if (data.choices?.[0]?.message) {
                    addMessage('assistant', data.choices[0].message.content);
                } else {
                    addMessage('assistant', "Hmm, I couldn't process that. Could you try again?");
                }
            } catch (error) {
                console.error("Error:", error);
                chatMessages.removeChild(typingIndicator);
                addMessage('assistant', "⚠️ Connection issue. Please try again shortly.");
            }
        }
        
        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => e.key === 'Enter' && sendMessage());
        
        // Quick actions
        document.querySelectorAll('.quick-action').forEach(btn => {
            btn.addEventListener('click', function() {
                const prompts = {
                    '♻️ Find Alternatives': "What are sustainable alternatives to [product]? Compare materials and brands.",
                    '📊 Carbon Impact': "How do I calculate the carbon footprint of buying [product]? What factors matter most?",
                    '💡 Eco Tips': "Give me 3 practical tips to make my [type of shopping] more eco-friendly.",
                    '🏪 Local Stores': "Where can I find stores selling sustainable [products] near [location]?"
                };
                userInput.value = prompts[this.textContent.trim()];
                userInput.focus();
            });
        });
        
        // Suggestions
        document.querySelectorAll('.suggestion-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                userInput.value = btn.textContent.trim();
                userInput.focus();
            });
        });

        // 3D Square Background
        function initThreeJS() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('threejs-bg').appendChild(renderer.domElement);

            // Create floating squares
            const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const material = new THREE.MeshBasicMaterial({ 
                color: 0x2dd4bf,
                transparent: true,
                opacity: 0.5
            });
            
            const squares = [];
            for(let i = 0; i < 30; i++) {
                const cube = new THREE.Mesh(geometry, material.clone());
                cube.position.x = (Math.random() - 0.5) * 10;
                cube.position.y = (Math.random() - 0.5) * 10;
                cube.position.z = (Math.random() - 0.5) * 10;
                cube.userData = {
                    speedX: Math.random() * 0.01 - 0.005,
                    speedY: Math.random() * 0.01 - 0.005,
                    speedZ: Math.random() * 0.01 - 0.005
                };
                scene.add(cube);
                squares.push(cube);
            }
            
            camera.position.z = 5;
            
            function animate() {
                requestAnimationFrame(animate);
                
                squares.forEach(cube => {
                    cube.position.x += cube.userData.speedX;
                    cube.position.y += cube.userData.speedY;
                    cube.position.z += cube.userData.speedZ;
                    
                    // Keep cubes within bounds
                    if (Math.abs(cube.position.x) > 5) cube.userData.speedX *= -1;
                    if (Math.abs(cube.position.y) > 5) cube.userData.speedY *= -1;
                    if (Math.abs(cube.position.z) > 5) cube.userData.speedZ *= -1;
                    
                    cube.rotation.x += 0.01;
                    cube.rotation.y += 0.01;
                });
                
                renderer.render(scene, camera);
            }
            
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        initThreeJS();
    </script>
</body>
</html>
